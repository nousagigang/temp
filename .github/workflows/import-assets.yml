name: Import Assets Folder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: migration

      - name: Clone source repo
        run: git clone --depth 1 https://github.com/k4lm3d/nsg.git source

      - name: Replace assets folder
        run: |
          rm -rf assets
          cp -R source/assets ./assets

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Import assets folder from k4lm3d/nsg"
            git push origin HEAD:migration
          fi
