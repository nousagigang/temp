name: Import Banners Folder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-banners:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: migration

      - name: Clone source repo
        run: git clone --depth 1 https://github.com/k4lm3d/nsg.git source

      - name: Move banners folder
        run: |
          # Ensure destination exists
          mkdir -p static

          # Remove old banners if present
          rm -rf static/banners

          # Move from content → static
          if [ -d "source/content/banners" ]; then
            cp -R source/content/banners static/banners
          else
            echo "No banners folder found in source repo"
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add static/banners

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Move banners from content to static"
            git push origin HEAD:migration
          fi
